# Keeps the vendored binaries in sync with upstream hatoo/oha.
#
# When upstream publishes a new release: bump the pin in
# download-oha-release.sh, re-download the binaries (sha256-verified against
# the upstream release asset digests), smoke-test the binary, commit straight
# to main, and publish a CalVer release. Packagist watches this repository and
# picks the new tag up automatically — no human in the loop.
#
# Note: pushes and releases made with the built-in GITHUB_TOKEN intentionally
# do not trigger other workflows (GitHub's anti-recursion rule), so test.yml
# and release.yml will not fire on these commits. That is fine — this workflow
# performs the same verification inline before anything is committed or tagged.
name: Sync upstream oha release

on:
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * *'

permissions:
  contents: write

concurrency:
  group: sync-oha
  cancel-in-progress: false

jobs:
  sync:
    name: Update vendored binaries from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run sync script
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          out=$(./sync-oha.sh)
          echo "$out"
          if grep -qxF 'changed=true' <<< "$out"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify the updated binary runs and reports the pinned version
        if: steps.sync.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pinned=$(grep -E '^OHA_VERSION=' download-oha-release.sh | cut -d'"' -f2)
          reported=$(./bin/oha --version | awk '{print $2}')
          echo "pinned=${pinned} reported=${reported}"
          test "$pinned" = "$reported"

      - name: Commit and push to main
        if: steps.sync.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          version=$(grep -E '^OHA_VERSION=' download-oha-release.sh | cut -d'"' -f2)
          git add download-oha-release.sh bin/
          git commit -m "chore: sync oha binaries to upstream v${version}"
          git push origin HEAD:main

      - name: Publish CalVer release
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(grep -E '^OHA_VERSION=' download-oha-release.sh | cut -d'"' -f2)
          base="v$(date -u +%Y.%m.%d)"
          tag="$base"
          n=0
          while [[ -n "$(git ls-remote --tags origin "refs/tags/${tag}")" ]]; do
            n=$((n + 1))
            tag="${base}.${n}"
          done
          gh release create "$tag" \
            --target "$(git rev-parse HEAD)" \
            --title "$tag" \
            --notes "Sync vendored \`oha\` binaries to upstream [hatoo/oha v${version}](https://github.com/hatoo/oha/releases/tag/v${version}). All binaries verified against the upstream release asset sha256 digests, and smoke-tested on the runner before tagging."

      - name: No changes
        if: steps.sync.outputs.changed != 'true'
        run: echo "Pinned oha version matches the latest upstream release; nothing to sync."

name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Verify binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04      # x86_64 linux (musl static binary)
          - ubuntu-24.04-arm  # aarch64 linux (musl static binary)
          - macos-15          # aarch64 macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate composer.json
        if: matrix.os == 'ubuntu-24.04'
        run: composer validate --strict

      - name: Verify committed binaries against upstream digests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./download-oha-release.sh --verify-only

      - name: Launcher runs and reports the pinned version
        run: |
          set -euo pipefail
          pinned=$(grep -E '^OHA_VERSION=' download-oha-release.sh | cut -d'"' -f2)
          reported=$(./bin/oha --version | awk '{print $2}')
          echo "pinned=${pinned} reported=${reported}"
          test "$pinned" = "$reported"
